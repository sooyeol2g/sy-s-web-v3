<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome to sooyeol2g.com</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .badge { font-size: 12px; color: #888; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 1.5rem; }
    h1 { font-size: 2.5rem; font-weight: 500; text-align: center; margin-bottom: 1rem; }
    .sub { color: #888; text-align: center; max-width: 340px; line-height: 1.7; margin-bottom: 2.5rem; }
    .links { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    a { padding: 10px 20px; border-radius: 8px; font-size: 14px; text-decoration: none; }
    .primary { background: #f0f0f0; color: #0f0f0f; font-weight: 500; }
    .ghost { color: #888; border: 1px solid #333; }
    footer { margin-top: 3rem; font-size: 12px; color: #555; }
  </style>
</head>
<body>
  <span class="badge">✦ Hello World!</span>
  <h1>SY Lee</h1>
  <p class="sub">Welcome to my Website!</p>
  <div class="links">
    <a class="primary" href="https://github.com/sooyeol2g">GitHub</a>
    <a class="ghost" href="#">Instagram</a>
    <a class="ghost" href="mailto:sy@sooyeol2g.com">Email</a>
  </div>
  <footer>sooyeol2g.com</footer>
</body>
</html>
